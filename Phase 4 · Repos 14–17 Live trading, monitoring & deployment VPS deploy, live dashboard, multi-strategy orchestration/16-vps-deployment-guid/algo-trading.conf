# /etc/nginx/sites-available/algo-trading
#
# nginx reverse proxy for the algo trading stack.
# This is the template — configure_ssl.sh writes the SSL version automatically.
# Use this file for HTTP-only local development or reference.
#
# For production HTTPS, run: sudo bash scripts/configure_ssl.sh domain email
#
# Port layout:
#   5000 — repo 10  webhook-flask-server
#   5001 — repo 14  live-trading-orchestrator
#   5002 — repo 19  ml-signal-filter (optional)

limit_req_zone  $binary_remote_addr zone=webhook:10m rate=30r/m;
limit_req_zone  $binary_remote_addr zone=admin:10m   rate=60r/m;
limit_conn_zone $binary_remote_addr zone=perip:10m;

server {
    listen 80;
    server_name _;       # Replace with your domain once DNS is set

    limit_conn perip 20;
    client_max_body_size 1m;

    access_log /var/log/nginx/algo-trading-access.log;
    error_log  /var/log/nginx/algo-trading-error.log;

    # ── Webhook (repo 10) ─────────────────────────────────────────────────────
    location /webhook {
        limit_req zone=webhook burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Orchestrator (repo 14) ────────────────────────────────────────────────
    location ~ ^/(trade|health|status|positions|config|admin) {
        limit_req zone=admin burst=20 nodelay;
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── ML Filter (repo 19) ───────────────────────────────────────────────────
    location /signal {
        limit_req zone=webhook burst=10 nodelay;
        proxy_pass         http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
